[linkedin]
# LinkedIn base URL
base_url = "https://www.linkedin.com"

[limits]
# Daily limits
invitations_per_day = 30
messages_per_day = 30
followups_per_day = 30
actions_per_session = 40

[delays]
# Delays between actions (seconds)
min_delay = 30
max_delay = 120

# Delay before follow-up (days)
followup_after_days = 5

[typing]
# Human typing simulation (ms)
min_char_delay_ms = 50
max_char_delay_ms = 200

[browser]
headless = false
slow_mo = 50  # ms between each Playwright action

# [user]
# Optional — auto-detected from LinkedIn at login.
# Uncomment to override (takes priority over auto-detection):
# first_name = "FirstName"
# last_name = "LastName"
# title = "My title"
